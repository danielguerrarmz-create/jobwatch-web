<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" role="img" aria-label="Jobwatch">
  <!-- Same mark, re-proportioned for 16-32px: heavier stroke and a wider
       notch so the opening doesn't optically close up at small sizes. -->
